services:
  orquestrador:
    build:
      context: .
      dockerfile: ./orquestrador/Dockerfile
      args:
        SERVICE_PATH: ./orquestrador
    container_name: orquestrador
    ports:
      - "5000:5000"
    command: ["python", "-m", "flask", "run", "--host=0.0.0.0", "--port=5000"] # <-- CORRIGIDO
    volumes:
      - ./orquestrador/src/main.py:/app/main.py
      - ./orquestrador/src/quais_modelos.py:/app/quais_modelos.py
      - ./registry:/app/registry
    environment:
      - FLASK_DEBUG=1
      - FLASK_APP=main
    env_file:
      - ./.env
    depends_on:
      - agente-pesquisador
      #- agente-escritor
      #- agente-codificador
      #- agente-shopee
      - indexer

  agente-pesquisador:
    build:
      context: .
      dockerfile: ./agentes/agente-pesquisador/Dockerfile
      args:
        SERVICE_PATH: ./agentes/agente-pesquisador
    container_name: agente-pesquisador
    command: ["python", "-m", "flask", "run", "--host=0.0.0.0", "--port=5001"] # <-- CORRIGIDO
    volumes:
      - ./agentes/agente-pesquisador/src/main.py:/app/main.py
      - ./registry:/app/registry
    environment:
      - FLASK_DEBUG=1
      - FLASK_APP=main
    env_file:
      - ./.env

  agente-escritor:
    build:
      context: .
      dockerfile: ./agentes/agente-escritor/Dockerfile
      args:
        SERVICE_PATH: ./agentes/agente-escritor
    container_name: agente-escritor
    command: ["python", "-m", "flask", "run", "--host=0.0.0.0", "--port=5002"] # <-- CORRIGIDO
    volumes:
      - ./agentes/agente-escritor/src/main.py:/app/main.py
      - ./registry:/app/registry
    environment:
      - FLASK_DEBUG=1
      - FLASK_APP=main
    env_file:
      - ./.env

  agente-codificador:
    build:
      context: .
      dockerfile: ./agentes/agente-codificador/Dockerfile
      args:
        SERVICE_PATH: ./agentes/agente-codificador
    container_name: agente-codificador
    command: ["python", "-m", "flask", "run", "--host=0.0.0.0", "--port=5003"] # <-- CORRIGIDO
    volumes:
      - ./agentes/agente-codificador/src/main.py:/app/main.py
      - ./registry:/app/registry
    environment:
      - FLASK_DEBUG=1
      - FLASK_APP=main
    env_file:
      - ./.env

  agente-shopee:
    build:
      context: .
      dockerfile: ./agentes/agente-shopee/Dockerfile
      args:
        SERVICE_PATH: ./agentes/agente-shopee
    container_name: agente-shopee
    command: ["python", "-m", "flask", "run", "--host=0.0.0.0", "--port=5004"] # <-- CORRIGIDO
    volumes:
      - ./agentes/agente-shopee/src/main.py:/app/main.py
      - ./registry:/app/registry
    environment:
      - FLASK_DEBUG=1
      - FLASK_APP=main
    env_file:
      - ./.env

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333" # Porta padrão do Qdrant
    volumes:
      - qdrant-data:/qdrant/storage

  indexer:
    build:
      context: .
      dockerfile: ./indexer/Dockerfile
      args:
        SERVICE_PATH: ./indexer
    container_name: indexer
    ports:
      - "5005:5000"
    command: ["python", "-m", "flask", "run", "--host=0.0.0.0", "--port=5000"]
    volumes:
      # --- CAMINHOS DOS VOLUMES CORRIGIDOS ---
      - ./indexer/src/main.py:/app/main.py
      - ./indexer/src/chunker_customizado.py:/app/chunker_customizado.py
      - ./indexer/src/refatorador_rag.py:/app/refatorador_rag.py
      - ./registry:/app/registry
    environment:
      - FLASK_APP=main
      - FLASK_DEBUG=1
    env_file:
      - ./.env
    depends_on:
      - qdrant

volumes:
  qdrant-data: