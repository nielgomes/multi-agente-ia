services:
  orquestrador:
    build:
      context: .
      dockerfile: ./orquestrador/Dockerfile
      args:
        SERVICE_PATH: ./orquestrador
    container_name: orquestrador
    ports:
      - "5000:5000"
    command: ["flask", "run", "--host=0.0.0.0", "--port=5000"]
    volumes:
      # --- MUDANÇA CRUCIAL AQUI ---
      # Mapeia apenas o arquivo de código, deixando o resto do contêiner intacto.
      - ./orquestrador/src/main.py:/app/main.py
      - ./orquestrador/src/quais_modelos.py:/app/quais_modelos.py
      # Este mapeamento agora vai funcionar corretamente.
      - ./registry:/app/registry
    environment:
      - FLASK_DEBUG=1
      - FLASK_APP=main
    env_file:
      - ./.env
    depends_on:
      #- agente-pesquisador
      #- agente-escritor
      #- agente-codificador
      - agente-shopee

  agente-pesquisador:
    build:
      context: .
      dockerfile: ./agentes/agente-pesquisador/Dockerfile
      args:
        SERVICE_PATH: ./agentes/agente-pesquisador
    container_name: agente-pesquisador
    command: ["flask", "run", "--host=0.0.0.0", "--port=5001"]
    volumes:
      - ./agentes/agente-pesquisador/src/main.py:/app/main.py
      - ./registry:/app/registry
    environment:
      - FLASK_DEBUG=1
      - FLASK_APP=main
    env_file:
      - ./.env

  agente-escritor:
    build:
      context: .
      dockerfile: ./agentes/agente-escritor/Dockerfile
      args:
        SERVICE_PATH: ./agentes/agente-escritor
    container_name: agente-escritor
    command: ["flask", "run", "--host=0.0.0.0", "--port=5002"]
    volumes:
      - ./agentes/agente-escritor/src/main.py:/app/main.py
      - ./registry:/app/registry
    environment:
      - FLASK_DEBUG=1
      - FLASK_APP=main
    env_file:
      - ./.env

  agente-codificador:
    build:
      context: .
      dockerfile: ./agentes/agente-codificador/Dockerfile
      args:
        SERVICE_PATH: ./agentes/agente-codificador
    container_name: agente-codificador
    command: ["flask", "run", "--host=0.0.0.0", "--port=5003"]
    volumes:
      - ./agentes/agente-codificador/src/main.py:/app/main.py
      - ./registry:/app/registry
    environment:
      - FLASK_DEBUG=1
      - FLASK_APP=main
    env_file:
      - ./.env

  agente-shopee:
    build:
      context: .
      dockerfile: ./agentes/agente-shopee/Dockerfile
      args:
        SERVICE_PATH: ./agentes/agente-shopee
    container_name: agente-shopee
    command: ["flask", "run", "--host=0.0.0.0", "--port=5004"]
    volumes:
      - ./agentes/agente-shopee/src/main.py:/app/main.py
      - ./registry:/app/registry
    environment:
      - FLASK_DEBUG=1
      - FLASK_APP=main
    env_file:
      - ./.env